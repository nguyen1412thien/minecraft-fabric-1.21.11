services:
  minecraft:
    image: itzg/minecraft-server
    container_name: minecraft-fabric

    ports:
      - "25565:25565"

    environment:
      EULA: "TRUE"
      TYPE: "FABRIC"
      VERSION: "1.21.11"
      MEMORY: "3G"
      JVM_XX_OPTS: "-XX:+UseZGC"
      TZ: "Asia/Ho_Chi_Minh"

    volumes:
      - ./data:/data

